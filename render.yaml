services:
  - type: web
    name: jlr-configurator-mcp
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_RATE_LIMIT_PER_MINUTE
        value: "60"
      # ChatGPT Developer Mode supports OAuth or no authentication.
      # This MCP is read-only and uses public JLR configurator payloads only,
      # so no-auth is acceptable for a short-lived demo endpoint.
      - key: ALLOW_UNAUTHENTICATED_HTTP
        value: "1"

